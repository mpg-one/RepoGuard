name: RepoGuard AI Agent Security
description: Scan a repository for AI coding-agent risks and optionally upload SARIF.

branding:
  icon: shield
  color: blue

inputs:
  path:
    description: Local repository path to scan.
    required: false
    default: "."
  fail-on:
    description: Risk level that fails the check.
    required: false
    default: "high"
  evidence:
    description: Evidence policy. Use none for SARIF uploads.
    required: false
    default: "none"
  baseline:
    description: Explicit baseline path. Never loaded automatically.
    required: false
    default: ""
  soft-fail:
    description: Report findings without failing the job.
    required: false
    default: "false"
  upload-sarif:
    description: Upload SARIF to GitHub code scanning.
    required: false
    default: "true"
  sarif-file:
    description: SARIF output path.
    required: false
    default: "repoguard.sarif"

outputs:
  verdict:
    description: RepoGuard machine verdict.
    value: ${{ steps.scan.outputs.verdict }}
  risk-level:
    description: RepoGuard risk level.
    value: ${{ steps.scan.outputs.risk-level }}
  exit-code:
    description: Scanner exit code before policy enforcement.
    value: ${{ steps.scan.outputs.exit-code }}
  sarif-file:
    description: SARIF report path.
    value: ${{ steps.scan.outputs.sarif-file }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install RepoGuard
      shell: bash
      env:
        REPOGUARD_ACTION_PATH: ${{ github.action_path }}
      run: python -m pip install "$REPOGUARD_ACTION_PATH"

    - name: Scan repository
      id: scan
      shell: bash
      env:
        REPOGUARD_PATH: ${{ inputs.path }}
        REPOGUARD_EVIDENCE: ${{ inputs.evidence }}
        REPOGUARD_BASELINE: ${{ inputs.baseline }}
        REPOGUARD_SARIF_FILE: ${{ inputs.sarif-file }}
      run: |
        set +e
        json_file="$RUNNER_TEMP/repoguard-action-${GITHUB_RUN_ID}-${GITHUB_ACTION}.json"
        rm -f -- "$REPOGUARD_SARIF_FILE" "$json_file"

        scan_args=(scan "$REPOGUARD_PATH" --evidence "$REPOGUARD_EVIDENCE")
        if [ -n "$REPOGUARD_BASELINE" ]; then
          scan_args+=(--baseline "$REPOGUARD_BASELINE")
        fi

        repoguard "${scan_args[@]}" --format json --output "$json_file"
        json_exit=$?
        repoguard "${scan_args[@]}" --format sarif --output "$REPOGUARD_SARIF_FILE"
        sarif_exit=$?

        REPOGUARD_JSON_FILE="$json_file" \
        REPOGUARD_JSON_EXIT="$json_exit" \
        REPOGUARD_SARIF_EXIT="$sarif_exit" \
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        json_path = Path(os.getenv("REPOGUARD_JSON_FILE", ""))
        json_exit = int(os.getenv("REPOGUARD_JSON_EXIT", "1"))
        sarif_exit = int(os.getenv("REPOGUARD_SARIF_EXIT", "1"))
        verdict = "ERROR"
        risk_level = "unknown"
        scan_exit = 1

        if json_exit in {0, 3} and json_path.is_file():
            try:
                payload = json.loads(json_path.read_text(encoding="utf-8"))
                verdict = payload["verdict"]
                risk_level = payload["risk_level"]
                scan_exit = 3 if payload.get("scan_status") == "incomplete" else 0
            except (KeyError, OSError, ValueError, TypeError):
                pass

        if json_exit not in {0, 3} or sarif_exit not in {0, 3}:
            verdict = "ERROR"
            risk_level = "unknown"
            scan_exit = 1
        elif json_exit == 3 or sarif_exit == 3:
            verdict = "INCOMPLETE"
            scan_exit = 3

        with open(os.getenv("GITHUB_OUTPUT", ""), "a", encoding="utf-8") as output:
            output.write("verdict={0}\n".format(verdict))
            output.write("risk-level={0}\n".format(risk_level))
            output.write("exit-code={0}\n".format(scan_exit))
            output.write("sarif-file={0}\n".format(os.getenv("REPOGUARD_SARIF_FILE", "")))
        PY
        exit 0

    - name: Upload SARIF
      if: ${{ always() && inputs.upload-sarif == 'true' }}
      continue-on-error: ${{ inputs.soft-fail == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-file }}

    - name: Enforce RepoGuard policy
      if: ${{ always() }}
      shell: bash
      env:
        REPOGUARD_SOFT_FAIL: ${{ inputs.soft-fail }}
        REPOGUARD_FAIL_ON: ${{ inputs.fail-on }}
        REPOGUARD_VERDICT: ${{ steps.scan.outputs.verdict }}
        REPOGUARD_RISK_LEVEL: ${{ steps.scan.outputs.risk-level }}
        REPOGUARD_SCAN_EXIT: ${{ steps.scan.outputs.exit-code }}
      run: |
        python - <<'PY'
        import os
        import sys

        if os.getenv("REPOGUARD_SOFT_FAIL", "false").lower() == "true":
            raise SystemExit(0)

        scan_exit = int(os.environ.get("REPOGUARD_SCAN_EXIT", "1"))
        verdict = os.environ.get("REPOGUARD_VERDICT", "ERROR")
        if scan_exit != 0 or verdict in {"INCOMPLETE", "ERROR"}:
            print("RepoGuard scan did not complete safely.", file=sys.stderr)
            raise SystemExit(1)

        order = {"clean": 0, "low": 1, "medium": 2, "high": 3, "critical": 4}
        threshold = os.getenv("REPOGUARD_FAIL_ON", "").lower()
        risk = os.getenv("REPOGUARD_RISK_LEVEL", "").lower()
        if threshold not in order or risk not in order:
            print("RepoGuard received an invalid risk threshold or result.", file=sys.stderr)
            raise SystemExit(1)
        if order[risk] >= order[threshold]:
            print(
                "RepoGuard blocked this check: risk {0} meets threshold {1}.".format(
                    risk, threshold
                ),
                file=sys.stderr,
            )
            raise SystemExit(2)
        PY
