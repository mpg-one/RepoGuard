name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: Run RepoGuard on itself
        run: PYTHONPATH=src python -m repoguard scan . --ignore-file .repoguardignore --fail-on critical
